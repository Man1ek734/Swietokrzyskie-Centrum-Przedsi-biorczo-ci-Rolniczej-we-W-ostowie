<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#f5f7fb;
      color:#0b2447;
    }

    header{
      max-width:1200px;
      margin:25px auto;
      background:white;
      border-radius:40px;
      padding:18px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .logo{
      display:flex;
      align-items:center;
      gap:18px;
    }

    .logo img{
      height:90px;
      width:auto;
    }

    .logo-text{
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .big-text{
      color:#3b5bd6;
      font-size:52px;
      font-weight:bold;
      line-height:1;
    }

    .small-text{
      color:#444;
      font-size:20px;
      line-height:1.1;
      letter-spacing:1px;
      margin-top:4px;
    }

    nav{
      display:flex;
      align-items:center;
      gap:45px;
    }

    nav a{
      text-decoration:none;
      color:#0b2447;
      font-weight:bold;
      font-size:19px;
      transition:all 0.3s ease;
      display:inline-block;
      padding:10px 15px;
      border-radius:15px;
    }

    nav a:hover{
      transform:scale(1.12);
      color:#e9a722;
      background:#f5f7fb;
    }

    .btn{
      background:#e9a722;
      color:white;
      text-decoration:none;
      padding:15px 30px;
      border-radius:35px;
      font-weight:bold;
      transition:all 0.3s ease;
      display:inline-block;
    }

    .btn:hover{
      transform:scale(1.08);
    }

    .container{
      max-width:950px;
      margin:40px auto;
      background:white;
      border-radius:45px;
      padding:60px;
      box-shadow:0 12px 35px rgba(0,0,0,0.08);
      text-align:center;
    }

    h1{
      font-size:56px;
      color:#003b7a;
      margin-bottom:30px;
    }

    h2{
      font-size:42px;
      color:#003b7a;
      margin-bottom:25px;
    }

    p{
      font-size:24px;
      margin-bottom:25px;
      line-height:1.7;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-top:25px;
    }

    .facebook{
      background:#1877f2;
    }

    hr{
      margin:60px 0;
      border:none;
      height:2px;
      background:#e5e7eb;
    }

    @media(max-width:900px){

      header{
        flex-direction:column;
        gap:20px;
      }

      nav{
        flex-wrap:wrap;
        justify-content:center;
      }

      .container{
        padding:35px;
      }

      h1{
        font-size:42px;
      }

    }

  </style>
</head>

<body>

<header>

  <div class="logo">

    <img src="logo.png.png" alt="Logo Starostwa">

    <div class="logo-text">

      <div class="big-text">
        Opatów
      </div>

      <div class="small-text">
        STAROSTWO<br>
        POWIATOWE
      </div>

    </div>

  </div>

  <nav>
    <a href="index.html">Strona główna</a>
    <a href="onas.html">O nas</a>
    <a href="#">Oferta</a>
  </nav>

  <a href="kontakt.html" class="btn">
    Skontaktuj się
  </a>

</header>

<div class="container">

  <h1>Kontakt</h1>

  <h2>Starostwo Opatowskie</h2>

  <p>
    <strong>Nr Tel:</strong>
    15 868 29 71
  </p>

  <div class="buttons">

    <a
      href="https://www.facebook.com/PowiatOpatowski"
      target="_blank"
      class="btn"
    >
      Facebook Starostwa
    </a>

  </div>

  <hr>

  <h2>Tomasz Staniek</h2>

  <p>
    <strong>Nr Tel:</strong>
    605 352 061
  </p>

  <div class="buttons">

    <a
      href="https://www.facebook.com/tomasz.staniek.1"
      target="_blank"
      class="btn facebook"
    >
      Facebook Tomasz Staniek
    </a>

  </div>

  <hr>

  <h2>Małgorzata Jałowska</h2>

  <p>
    <strong>Nr Tel:</strong>
    609 775 440
  </p>

  <div class="buttons">

    <a
      href="https://www.facebook.com/jalowskamalgorzata"
      target="_blank"
      class="btn facebook"
    >
      Facebook Małgorzata Jałowska
    </a>

  </div>

</div>

</body>
</html>
