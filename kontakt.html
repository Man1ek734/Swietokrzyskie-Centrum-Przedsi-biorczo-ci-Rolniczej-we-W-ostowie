<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#f5f7fb;
      color:#0b2447;
    }

    .container{
      max-width:950px;
      margin:60px auto;
      background:white;
      border-radius:40px;
      padding:60px;
      box-shadow:0 12px 35px rgba(0,0,0,0.1);
      text-align:center;
    }

    .herb{
      width:170px;
      margin-bottom:30px;
    }

    h1{
      font-size:54px;
      color:#003b7a;
      margin-bottom:35px;
    }

    h2{
      font-size:42px;
      color:#003b7a;
      margin-bottom:25px;
    }

    p{
      font-size:26px;
      margin-bottom:25px;
      line-height:1.7;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-top:25px;
    }

    .btn{
      padding:16px 34px;
      border-radius:35px;
      text-decoration:none;
      color:white;
      font-weight:bold;
      transition:all 0.3s ease;
      display:inline-block;
      font-size:18px;
    }

    .btn:hover{
      transform:scale(1.08);
    }

    .gold{
      background:#e9a722;
    }

    .facebook{
      background:#1877f2;
    }

    .back{
      background:#003b7a;
    }

    hr{
      margin:60px 0;
      border:none;
      height:2px;
      background:#e5e7eb;
    }

    .bottom{
      margin-top:60px;
    }

  </style>
</head>

<body>

<div class="container">

  <img
    src="POL_powiat_opatowski_COA.svg.png"
    class="herb"
    alt="Herb Powiatu Opatowskiego"
  >

  <h1>Starostwo Opatowskie</h1>

  <p>
    <strong>Nr Tel:</strong>
    15 868 29 71
  </p>

  <div class="buttons">

    <a
      href="https://www.facebook.com/PowiatOpatowski"
      target="_blank"
      class="btn gold"
    >
      Facebook Starostwa
    </a>

  </div>

  <hr>

  <h2>Tomasz Staniek</h2>

  <p>
    <strong>Nr Tel:</strong>
    605 352 061
  </p>

  <div class="buttons">

    <a
      href="https://www.facebook.com/tomasz.staniek.1"
      target="_blank"
      class="btn facebook"
    >
      Facebook Tomasz Staniek
    </a>

  </div>

  <div class="bottom">

    <a
      href="index.html"
      class="btn back"
    >
      ← Powrót na stronę główną
    </a>

  </div>

</div>

</body>
</html>
